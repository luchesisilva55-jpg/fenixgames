<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Games - Oficial</title>
    <style>
        :root { 
            --cor-fundo: #0b0e11; 
            --cor-card: #161b22; 
            --cor-laranja: #ff9900; 
            --cor-sucesso: #00e676;
        }
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; padding-bottom: 100px; text-align: center; }
        .tela { display: none; padding: 20px; }
        .tela.ativa { display: block; }
        .header { padding: 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #30363d; }
        .logo-img { width: 80px; border-radius: 50%; border: 2px solid var(--cor-laranja); }
        .btn-aposta { padding: 15px 30px; background: var(--cor-laranja); border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .input-padrao { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: white; }
        .nav-fixa { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #30363d; }
        .nav-item { color: #8b949e; cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--cor-laranja); }
    </style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="tela-login" class="tela ativa">
    <h2>Bem-vindo à Fênix</h2>
    <input type="text" id="nomeUser" class="input-padrao" placeholder="Seu Nome">
    <input type="text" id="pixUser" class="input-padrao" placeholder="Sua Chave PIX">
    <button class="btn-aposta" onclick="realizarLogin()">Entrar / Registrar</button>
</div>

<!-- HEADER (Aparece após login) -->
<div id="main-ui" style="display: none;">
    <div class="header">
        <img src="https://via.placeholder.com/80" id="header-img" class="logo-img">
        <div id="bonus-status" style="margin-top:10px; color: var(--cor-laranja);">🎁 Status: Aguardando Depósito</div>
    </div>

    <div id="tela-jogos" class="tela ativa">
        <h2>Selecione um jogo</h2>
        <button class="btn-aposta" onclick="alert('Deposite para liberar os jogos!')">Jogar Roleta</button>
    </div>

    <div id="tela-indicacao" class="tela">
        <h2>Convide Amigos</h2>
        <p>Indique e ganhe bônus por cada amigo que depositar!</p>
        <div id="link-indicacao" style="background: #21262d; padding: 15px; border-radius: 10px; margin: 10px;">
            https://fenixgames.com/ref/<span id="id-usuario">...</span>
        </div>
        <button class="btn-aposta" onclick="copiarLink()">Copiar Link</button>
    </div>

    <nav class="nav-fixa">
        <div class="nav-item active" onclick="mudarTela('jogos')">🎮<br>Jogos</div>
        <div class="nav-item" onclick="mudarTela('indicacao')">👥<br>Indicar</div>
    </nav>
</div>

<script>
    function realizarLogin() {
        const nome = document.getElementById('nomeUser').value;
        if(nome) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('id-usuario').innerText = nome.toLowerCase().replace(/\s/g, '');
        } else {
            alert("Preencha seu nome!");
        }
    }

    function mudarTela(id) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('tela-' + id).classList.add('ativa');
    }

    function copiarLink() {
        alert("Link copiado! Compartilhe com seus amigos para ganhar bônus.");
    }
</script>

</body>
</html>
