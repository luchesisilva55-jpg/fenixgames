<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Games - Oficial</title>
    <style>
        :root { --cor-fundo: #0b0e11; --cor-card: #161b22; --cor-laranja: #ff9900; --cor-neon: #00f2fe; --cor-ouro: #ffd700; }
        body { background: radial-gradient(circle at top, #1a1f26, #0b0e11); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* LOGO E ANIMAÇÃO */
        .logo-img { width: 200px; border-radius: 50%; border: 3px solid var(--cor-laranja); box-shadow: 0 0 30px rgba(255, 153, 0, 0.5); animation: pulse 2s infinite; margin-top: 50px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* ROLETA ESTILIZADA */
        .roleta { width: 220px; height: 220px; border: 8px double var(--cor-ouro); border-radius: 50%; margin: 30px auto; display: flex; justify-content: center; align-items: center; background: conic-gradient(from 0deg, #333, #000, #333); color: var(--cor-ouro); text-shadow: 0 0 10px var(--cor-ouro); font-size: 1.5rem; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
        
        /* BOTÃO APOSTA */
        .btn-aposta { padding: 18px 40px; background: linear-gradient(45deg, var(--cor-laranja), #ff5e00); border: none; border-radius: 50px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4); }

        /* MENU INFERIOR FIXO */
        .nav-fixa { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #30363d; z-index: 100; }
    </style>
</head>
<body>

<!-- LOGO -->
<img src="1000695330.png" class="logo-img" alt="Fênix Games">

<!-- CONTEÚDO -->
<div style="padding: 20px;">
    <h1>Roleta de Bônus</h1>
    <div class="roleta" id="roleta">GIRAR</div>
    <button class="btn-aposta" onclick="girarRoleta()">Girar por R$ 2,00</button>
    <p>Saldo: R$ <span id="saldo">50.00</span></p>
</div>

<!-- MENU INFERIOR -->
<nav class="nav-fixa">
    <div style="text-align:center;">🎮<br><small>Menu</small></div>
    <div style="text-align:center; color:var(--cor-laranja);">🎰<br><small>Cassino</small></div>
    <div style="text-align:center;">⭐<br><small>Favoritos</small></div>
</nav>

<script>
    let saldo = 50.00;
    function girarRoleta() {
        if (saldo >= 2.00) {
            saldo -= 2.00;
            document.getElementById('roleta').innerText = "Girando...";
            setTimeout(() => {
                let premio = Math.random() > 0.7 ? 10.00 : 0;
                saldo += premio;
                document.getElementById('roleta').innerText = premio > 0 ? "GANHOU R$ " + premio : "Tente de novo!";
                document.getElementById('saldo').innerText = saldo.toFixed(2);
            }, 1500);
        } else {
            alert("Saldo insuficiente!");
        }
    }
</script>

</body>
</html>
