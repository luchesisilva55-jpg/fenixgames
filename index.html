<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Games - Oficial</title>
    <style>
        :root { 
            --cor-fundo: #0b0e11; 
            --cor-card: #161b22; 
            --cor-laranja: #ff9900; 
            --cor-neon: #00f2fe; 
            --cor-ouro: #ffd700; 
            --cor-sucesso: #00e676;
        }

        body { 
            background: radial-gradient(circle at top, #1a1f26, #0b0e11); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding-bottom: 100px; 
            text-align: center;
            overflow-x: hidden;
        }

        /* TELA DE ENTRADA (SPLASH SCREEN) */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e11;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .splash-logo {
            width: 180px;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 153, 0, 0.4);
            animation: pulse 2s infinite;
        }
        .splash-titulo {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--cor-ouro);
            margin-top: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* HEADER & SALDO */
        .header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-img { 
            width: 80px; 
            border-radius: 50%; 
            border: 2px solid var(--cor-laranja); 
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.3); 
        }

        .saldo-container {
            font-size: 1.3rem;
            margin: 10px 0 5px 0;
            font-weight: bold;
            color: var(--cor-sucesso);
        }

        .bonus-aviso {
            font-size: 0.85rem;
            color: var(--cor-ouro);
            background: rgba(255, 215, 0, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 5px;
        }

        /* GERENCIADOR DE TELAS */
        .tela {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .tela.ativa {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); } 
        }

        /* ROLETA */
        .roleta { 
            width: 200px; height: 200px; 
            border: 8px double var(--cor-ouro); 
            border-radius: 50%; margin: 30px auto; 
            display: flex; justify-content: center; align-items: center; 
            background: conic-gradient(from 0deg, #333, #000, #333); 
            color: var(--cor-ouro); text-shadow: 0 0 10px var(--cor-ouro); 
            font-size: 1.3rem; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); 
            transition: transform 1.5s ease-out;
        }
        
        /* CASSINO SLOTS */
        .slots-container { display: flex; justify-content: center; gap: 15px; margin: 30px auto; }
        .slot-box { 
            width: 70px; height: 90px; background: #21262d; 
            border: 3px solid var(--cor-neon); border-radius: 10px; 
            font-size: 3rem; line-height: 90px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); 
        }

        /* CARTAS */
        .carta-box { 
            width: 110px; height: 160px; background: white; color: black; 
            border-radius: 10px; margin: 20px auto; font-size: 4rem; 
            line-height: 160px; font-weight: bold; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); 
        }
        .btn-escolha { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-maior { background: #00e676; color: black; }
        .btn-menor { background: #ff1744; color: white; }

        /* TELA DE SAQUE */
        .caixa-saque {
            background: var(--cor-card);
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            text-align: left;
        }
        .aviso-bloqueio {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid #ff1744;
            color: #ff5252;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        /* BOTÕES */
        .btn-aposta { 
            padding: 15px 35px; background: linear-gradient(45deg, var(--cor-laranja), #ff5e00); 
            border: none; border-radius: 50px; color: white; font-weight: bold; 
            font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4); margin-top: 15px;
        }
        .btn-verde { background: linear-gradient(45deg, #00e676, #00b0ff); color: black; }

        /* MENU INFERIOR */
        .nav-fixa { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #000; 
            display: flex; justify-content: space-around; padding: 15px 0; 
            border-top: 2px solid #30363d; z-index: 100; 
        }
        .nav-item { text-align: center; font-size: 0.85rem; cursor: pointer; color: #8b949e; }
        .nav-item.active { color: var(--cor-laranja); }
    </style>
</head>

<div id="splash-screen">
    <img id="splash-img" class="splash-logo" alt="Logo Fênix">
    <div class="splash-titulo">FÊNIX GAMES</div>
    <p style="color: #8b949e; margin-top: 10px;">Carregando plataforma...</p>
</div>

<div class="header">
    <img id="header-img" class="logo-img" alt="Fênix Games">
    <div class="saldo-container">Saldo: R$ <span id="saldo">70.00</span></div>
    <div class="bonus-aviso" id="bonusAviso">🎁 R$ 20,00 de bônus de entrada ativado!</div>
</div>

<div id="tela-roleta" class="tela ativa">

    <p style="color: #8b949e;">Ganhe até R$ 15,00 nesta roleta da sorte.</p>

    <button class="btn-aposta" id="btnRoleta" onclick="jogarRoleta()">Girar por R$ 2,00</button>
</div>

<div id="tela-slots" class="tela">
    <h2>Fênix Slots</h2>
    <p style="color: #8b949e;">Combine 3 símbolos iguais para ganhar R$ 25,00!</p>
    
    <div class="slots-container">
        <div class="slot-box" id="slot1">🎰</div>
        <div class="slot-box" id="slot2">🎰</div>
        <div class="slot-box" id="slot3">🎰</div>
    </div>
    
    <button class="btn-aposta" id="btnSlots" onclick="jogarSlots()">Puxar Alavanca (R$ 3,00)</button>
</div>

<div id="tela-cartas" class="tela">
    <h2>Maior ou Menor</h2>

    <div class="carta-box" id="cartaVisual">7</div>
    <p id="feedbackCartas" style="color: var(--cor-ouro); font-weight: bold; min-height: 20px;"></p>

        <button class="btn-escolha btn-maior" id="btnMaior"
