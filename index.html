<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fênix Games - Oficial</title>
    <style>
        :root {
            --bg-principal: #0b0e11;
            --bg-card: #161b22;
            --cor-neon: #00f2fe;
            --cor-ouro: #ffd700;
            --cor-laranja: #ff9900;
            --texto: #ffffff;
            --texto-secundario: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #000;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #21262d;
        }

        .logo {
            color: var(--cor-laranja);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .saldo-topo {
            background: #1f242c;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--cor-ouro);
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--cor-ouro);
        }

        .hero-banner {
            width: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--cor-laranja);
        }

        .hero-banner h1 {
            color: var(--cor-laranja);
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .destaque-bonus {
            color: var(--cor-ouro);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .main-content {
            padding: 20px;
            flex: 1;
        }

        .section-title {
            color: var(--texto);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            text-align: center;
            padding-bottom: 12px;
        }

        .game-img-box {
            height: 110px;
            background: #21262d;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
        }

        .game-name {
            font-size: 0.95rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn-jogar {
            width: 85%;
            padding: 10px;
            background: var(--cor-neon);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- JANELA DO JOGO (MODAL) --- */
        .modal-jogo {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-container {
            background: var(--bg-card);
            border: 2px solid var(--cor-neon);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            position: relative;
        }

        .btn-fechar {
            position: absolute;
            top: 15px; right: 15px;
            background: transparent;
            border: none; color: #fff;
            font-size: 1.5rem; cursor: pointer;
        }

        .tela-gameplay {
            background: #000;
            height: 180px;
            border-radius: 10px;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px dashed #30363d;
        }

        .btn-apostar {
            background: linear-gradient(45deg, var(--cor-laranja), var(--cor-ouro));
            color: #000; padding: 12px 25px; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            font-size: 1.1rem; text-transform: uppercase;
        }

        /* --- SISTEMA DE DEPÓSITO DENTRO DO JOGO --- */
        .caixa-deposito {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
        }

        .input-deposito {
            width: 70%; padding: 8px; background: #21262d;
            border: 1px solid #30363d; color: #fff; border-radius: 5px;
            text-align: center; margin-bottom: 10px;
        }

        .btn-gerar-pix {
            background: var(--cor-neon); color: #000;
            padding: 8px 15px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }

        #area-pix {
            display: none; margin-top: 15px;
        }

        .qr-code { width: 140px; height: 140px; background: #fff; padding: 5px; margin: 10px auto; }
        
        .pix-code { font-size: 0.75rem; background: #21262d; padding: 5px; border-radius: 4px; word-break: break-all; margin-bottom: 5px; }

        footer {
            background-color: #000; padding: 12px;
            border-top: 1px solid #21262d; position: sticky; bottom: 0;
            display: flex; justify-content: space-around;
        }
        .footer-item { display: flex; flex-direction: column; align-items: center; color: var(--texto-secundario); font-size: 0.75rem; }
        .footer-item.active { color: var(--cor-laranja); }
    </style>
</head>
<body>

    <!-- Header com Saldo Dinâmico -->
    <header>
        <div class="logo">Fênix</div>
        <div class="saldo-topo">Saldo: R$ <span id="saldo-atual">5.00</span></div>
    </header>

    <!-- Banner -->
    <div class="hero-banner">
        <h1>Fênix Games</h1>
        <div class="destaque-bonus">🎁 BÔNUS DE R$ 5,00 JÁ ATIVADO!</div>
    </div>

    <!-- Seção de Jogos Populares -->
    <div class="main-content">
        <div class="section-title">⭐ Jogos Populares</div>

        <div class="games-grid">
            <!-- Jogo 1 -->
            <div class="game-card">
                <div class="game-img-box">✈️</div>
                <div class="game-name">Aviator</div>
                <button class="btn-jogar" onclick="abrirJogo('Aviator', '✈️')">Jogar</button>
            </div>
            <!-- Jogo 2 -->
            <div class="game-card">
                <div class="game-img-box">🐇</div>
                <div class="game-name">Fortune Rabbit</div>
                <button class="btn-jogar" onclick="abrirJogo('Fortune Rabbit', '🐇')">Jogar</button>
            </div>
            <!-- Jogo 3 -->
            <div class="game-card">
                <div class="game-img-box">🎲</div>
                <div class="game-name">Bac Bo</div>
                <button class="btn-jogar" onclick="abrirJogo('Bac Bo', '🎲')">Jogar</button>
            </div>
            <!-- Jogo 4 -->
            <div class="game-card">
                <div class="game-img-box">🎡</div>
                <div class="game-name">Roleta</div>
                <button class="btn-jogar" onclick="abrirJogo('Roleta', '🎡')">Jogar</button>
            </div>
        </div>
    </div>

    <!-- TELA DO JOGO (MODAL INTERNO) -->
    <div id="modal-jogo" class="modal-jogo">
        <div class="modal-container">
            <button class="btn-fechar" onclick="fecharJogo()">✕</button>
            <h2 id="modal-titulo" style="color: var(--cor-laranja);">Jogo</h2>
            
            <div class="tela-gameplay">
                <div id="modal-icone" style="font-size: 3.5rem; margin-bottom: 10px;">🎮</div>
                <button class="btn-apostar" onclick="fazerAposta()">Girar / Apostar (R$ 1,00)</button>
            </div>

            <!-- Recarga Direta na Tela do Jogo -->
            <div class="caixa-deposito">
                <h4 style="color: var(--cor-neon); margin-bottom: 5px;">Ficou sem saldo? Recarregue via PIX</h4>
                <input type="number" id="valor-recarga" class="input-deposito" placeholder="Valor R$ (Ex: 10)">
                <br>
                <button class="btn-gerar-pix" onclick="gerarPixInterno()">Gerar PIX</button>
                
                <div id="area-pix">
                    <img id="qr-img" class="qr-code" src="" alt="QR Code">
                    <div id="pix-string" class="pix-code">Código...</div>
                    <button class="btn-gerar-pix" style="background:var(--cor-ouro)" onclick="copiarPix()">Copiar Código</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Fixo -->
    <footer>
        <div class="footer-item active"><span>🏠 Início</span></div>
        <div class="footer-item"><span>🎰 Cassino</span></div>
        <div class="footer-item"><span>🎁 Promo</span></div>
        <div class="footer-item"><span>👤 Conta</span></div>
    </footer>

    <script>
        let saldo = 5.00;

        function atualizarDisplaySaldo() {
            document.getElementById('saldo-atual').innerText = saldo.toFixed(2);
        }

        function abrirJogo(nome, icone) {
            document.getElementById('modal-titulo').innerText = nome;
            document.getElementById('modal-icone').innerText = icone;
            document.getElementById('modal-jogo').style.display = 'flex';
            document.getElementById('area-pix').style.display = 'none';
        }

        function fecharJogo() {
            document.getElementById('modal-jogo').style.display = 'none';
        }

        function fazerAposta() {
            if (saldo < 1.00) {
                alert("Saldo insuficiente! Faça uma recarga via PIX abaixo.");
                return;
            }
            saldo -= 1.00;
            atualizarDisplaySaldo();
            
            // Simulação básica de ganho/perda
            if(Math.random() > 0.5) {
                let ganho = 2.00;
                saldo += ganho;
                alert("Você GANHOU R$ 2,00!");
            } else {
                alert("Não foi dessa vez! Tente de novo.");
            }
            atualizarDisplaySaldo();
        }

        function gerarPixInterno() {
            let v = document.getElementById('valor-recarga').value;
            if(!v || v <= 0) { alert("Digite um valor válido!"); return; }
            
            document.getElementById('area-pix').style.style.display = 'block';
            document.getElementById('qr-img').src = "https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=00020101021126580014br.gov.bcb.pix01369527ec56-62b1-419f-9ef4-fenixgames2026";
            document.getElementById('pix-string').innerText = "00020101021126580014br.gov.bcb.pix01369527ec56-62b1-419f-9ef4-fenixgames20265204000053039865405" + v + "5802BR5910FenixGames6009SAOPAULO62070503***6304ED29";
        }

        function copiarPix() {
            let txt = document.getElementById('pix-string').innerText;
            navigator.clipboard.writeText(txt);
            alert("Código PIX copiado!");
        }
    </script>
</body>
</html>
